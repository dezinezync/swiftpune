<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Warm-cream card with chunky soft border -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#FAF7F2" stroke="#16151D" stroke-width="3"/>
  <!-- Soft coral bubble blob — echoes the logo without copying its gradient -->
  <ellipse cx="32" cy="32" rx="20" ry="18" fill="#E94B6B" opacity="0.18"/>
  <!-- "SP" mark in deep ink, bold display -->
  <text x="32" y="42"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Helvetica, Arial, sans-serif"
        font-weight="900"
        font-size="30"
        font-style="italic"
        letter-spacing="-1"
        fill="#16151D">SP</text>
  <!-- Coral period — the brand's accent in punctuation form -->
  <circle cx="50" cy="44" r="3" fill="#E94B6B"/>
</svg>
